<VirtualHost *:80>
    ServerName report.univalle.edu.co

    ProxyRequests Off
    ProxyPreserveHost On

    ProxyPass /reportes/GenerarReporte http://127.0.0.1:8080/reportesJasper/GenerarReporte
    ProxyPassReverse /reportes/GenerarReporte http://127.0.0.1:8080/reportesJasper/GenerarReporte

    # PDFs generados - servidos estáticamente
    Alias /reportes/siaap /vhosts/reportes/siaap
    Alias /reportes/sifi /vhosts/reportes/sifi

    <Directory /vhosts/reportes>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog /var/log/httpd/reportes_error.log
    CustomLog /var/log/httpd/reportes_access.log combined
</VirtualHost>
